[platformio]
default_envs = tlora_pager
src_dir = src
;extra_configs =
;    UniversalMeshGUI/coordinators.ini
;    UniversalMeshGUI/nodes.ini

; --- GLOBAL CONFIGURATION ---
; We define common libraries and ignored libraries in separate sections to avoid duplication across different environments. Each environment can then reference these common settings, making it easier to maintain and update the library dependencies in one place.
[env]
framework = arduino
monitor_speed = 115200
; Use the pioarduino fork for all ESP32 variants to ensure C6/RISC-V support
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
lib_ldf_mode = deep

; --- OTA WiFi credentials (shared across all node environments) ---
[node_ota]
build_flags =
    -D OTA_SSID=\"TechInc\"
    -D OTA_PASSWORD=\"itoldyoualready\"

; --- LIBRARY DEPENDENCIES ---
[common_libs]
; These libraries are common to all ESP32 variants (coordinator and sensor node), but not needed for the ESP8266 display gateway
lib_deps_common =
    bblanchon/ArduinoJson
    knolleary/PubSubClient
    mathieucarbou/ESP Async WebServer
	mathieucarbou/AsyncTCP

; These libraries are needed for the sensor node, but not for the coordinator (since the coordinator doesn't have any sensors attached to it)
lib_deps_sensor_node = 
    bblanchon/ArduinoJson
    ; adafruit/Adafruit GFX Library @ ^1.11.9
    ; adafruit/Adafruit SSD1306 @ ^2.5.9

; The ESP8266 has some additional libraries for the display gateway
lib_deps_esp8266 = 
    bblanchon/ArduinoJson @ ^7.0.4
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.9
; We ignore the Async TCP library for the ESP8266 environment since it's not compatible with that platform, and we don't need it for the display gateway
lib_deps_ignore = 
	Async TCP

[env:tlora_pager]
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = lilygo-t-lora-pager
board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.arduino.memory_type = qio_qspi
board_build.partitions = partitions/t_lora_pager.csv
build_flags =
    ${node_ota.build_flags}
    -D BOARD_HAS_PSRAM
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_T_LORA_PAGER
    -D ARDUINO_LILYGO_LORA_LR1121 ; Used LR1121 LoRa
    ;-D ARDUINO_LILYGO_LORA_SX1262
    -D RADIOLIB_EXCLUDE_RF69
    -D RADIOLIB_EXCLUDE_SX1231
    -D RADIOLIB_EXCLUDE_RFM2X
    -D RADIOLIB_EXCLUDE_SX127X
    -D RADIOLIB_EXCLUDE_AFSK
    -D RADIOLIB_EXCLUDE_AX25
    -D RADIOLIB_EXCLUDE_HELLSCHREIBER
    -D RADIOLIB_EXCLUDE_MORSE
    -D RADIOLIB_EXCLUDE_RTTY
    -D RADIOLIB_EXCLUDE_SSTV
    -D RADIOLIB_EXCLUDE_DIRECT_RECEIVE
    -D RADIOLIB_EXCLUDE_APRS
    -D RADIOLIB_EXCLUDE_BELL
    -D NODE_NAME=\"um-pager\"

build_src_filter = +<*.cpp>
    +<helpers/*.cpp>
    +<radio/*.cpp>
    +<font/um_icons.c>
    +<font/um_icons_80.c>
    +<font/um_icons_14.c>
    
lib_deps =
    ${common_libs.lib_deps_sensor_node}
    https://github.com/johestephan/UniversalMesh
    https://github.com/Xinyuan-LilyGO/LilyGoLib
    https://github.com/lewisxhe/ST25R3916-fork.git
    https://github.com/lewisxhe/NFC-RFAL-fork.git
    lvgl/lvgl @ ^9.4.0
    jgromes/RadioLib @ ^7.4.0
    lewisxhe/XPowersLib@^0.3.1
    lewisxhe/SensorLib @ ^0.3.3
    mikalhart/TinyGPSPlus @ ^1.0.3
    adafruit/Adafruit TCA8418 @ ^1.0.2
    adafruit/Adafruit BusIO @ ^1.17.0
    h2zero/NimBLE-Arduino @ ^2.2.3
    bblanchon/ArduinoJson
    knolleary/PubSubClient
    Radiolib

lib_ignore =
    ${common_libs.lib_deps_ignore}
    ESP32 BLE Arduino

; -------------------------------------------------------
; Desktop SDL2 simulator — test the UI without flashing
; Build:  pio run -e sim
; Run:    .pio/build/sim/program
; Quit:   close the window or Ctrl-C
; Prereq: brew install sdl2
; -------------------------------------------------------
[env:tlora_pager_sim]
platform   = native
framework  =
build_flags =
    -D SIM_BUILD
    -D LV_CONF_INCLUDE_SIMPLE
    -D NODE_NAME=\"sim-node\"
    -I src/sim
    -I src/sim/stubs
    -I src/helpers
    !sdl2-config --cflags --libs
    -std=c++17

build_src_filter =
    -<*>
    +<um_menu.cpp>
    +<um_welcome.cpp>
    +<um_messages.cpp>
    +<um_lora.cpp>
    +<um_settings.cpp>
    +<um_help.cpp>
    +<um_info.cpp>
    +<um_sd.cpp>
    +<um_nfc.cpp>
    +<um_gps.cpp>
    +<helpers/um_storage.cpp>
    +<helpers/um_toast.cpp>
    +<sim/main_sim.cpp>
    +<sim/um_mesh_stub.cpp>
    +<font/um_icons.c>
    +<font/um_icons_80.c>
    +<font/um_icons_14.c>

lib_deps =
    lvgl/lvgl @ ^9.4.0
